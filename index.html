<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIM Cloud System | Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --surface: #020617;
            --card: rgba(15, 23, 42, 0.6);
            --text-main: #F8FAFC;
        }

        /* Light Mode Variables */
        body.light-mode {
            --surface: #F1F5F9;
            --text-main: #0F172A;
            --card: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--surface);
            color: var(--text-main);
            scroll-behavior: smooth;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        /* Animated Aurora Background */
        .aurora-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            transition: opacity 0.5s ease;
        }
        body.light-mode .aurora-container {
            opacity: 0.15;
            background: radial-gradient(circle at 50% 50%, #cbd5e1 0%, #f1f5f9 100%);
        }

        .orb {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.2;
            animation: float 25s infinite alternate;
        }
        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(15%, 15%) scale(1.1); }
        }

        /* Glassmorphism Classes */
        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.5s ease, border 0.5s ease;
        }
        body.light-mode .glass {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        /* Product Card */
        .product-card {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }
        .product-card:hover {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6);
        }
        body.light-mode .product-card:hover {
            background: white;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.1);
        }

        /* Custom Inputs */
        .custom-input {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 14px 18px;
            color: white;
            transition: all 0.4s;
        }
        body.light-mode .custom-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #0f172a;
        }
        .custom-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* Category Banner */
        .category-banner {
            height: 320px;
            border-radius: 40px;
            background-size: cover;
            background-position: center;
            position: relative;
            margin-bottom: 3rem;
            display: flex;
            align-items: flex-end;
            padding: 3rem;
            overflow: hidden;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
        }
        .category-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(2, 6, 23, 0.85) 100%);
        }
        body.light-mode .category-banner::after {
            background: linear-gradient(180deg, transparent 20%, rgba(241, 245, 249, 0.9) 100%);
        }
        body.light-mode .category-banner h2 {
            color: #0f172a;
        }

        /* Utility */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .skeleton {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: loading 2s infinite ease-in-out;
        }
        body.light-mode .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Light mode text colors */
        body.light-mode .text-white { color: #0f172a !important; }
        body.light-mode .text-slate-300 { color: #334155 !important; }
        body.light-mode .text-slate-400 { color: #475569 !important; }
        body.light-mode .bg-slate-950\/40 { background: #f1f5f9 !important; }
        body.light-mode .product-card h3 { color: #0f172a !important; }
    </style>
</head>

        import { 
            getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD1xDsdxSTi0z9SCRiFxI4S_GwEvIWO7z0",
            authDomain: "wmsmartpim.firebaseapp.com",
            databaseURL: "https://wmsmartpim-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wmsmartpim",

            messagingSenderId: "610276453653",
            appId: "1:610276453653:web:2340b19bbd8a99267f4d1c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const inventoryRef = collection(db, "pim_inventory");

        const translations = {
            en: {
                "main-title": "PIM Cloud", "sub-title": "Inventory Management", "search-placeholder": "Search name or SKU code...", "btn-backup": "Export CSV", "sku-count-label": "SKU Count", "nav-kitchen": "Kitchen Appliances", "nav-laundry": "Bathroom Solutions", "nav-cooling": "Cooling Systems", "nav-small": "Smart Gadgets", "form-title": "Inventory Entry", "label-name": "Product Title", "ph-name": "e.g. Panasonic OLED TV", "label-sku": "SKU", "label-cat": "Group", "cat-k": "Kitchen", "cat-l": "Bathroom", "cat-c": "Cooling", "cat-s": "Small Items", "label-cost": "Cost (RM)", "label-price": "Price (RM)", "label-stock": "Available Stock", "label-spec": "Tech Specs", "ph-spec": "500W / 15 Liters", "btn-save": "Sync to Cloud", "sync-init": "Initializing Sync...", "sync-desc": "Real-time Firebase link enabled.", "empty-msg": "No records found matching your search.", "items-unit": "Items", "margin-label": "Margin", "stock-label": "Stock", "spec-label": "Spec", "cost-label": "Cost", "profit-label": "Profit", "price-label": "Sales Price", "delete-confirm": "Permanently delete this cloud entry?", "sync-success": "Cloud Synced", "sync-fail": "Connection Offline", "label-brand": "Brand", "label-dim": "Dimension", "label-colour": "Colour", "label-power": "Power"
            },
            zh: {
                "main-title": "产品 PIM 云系统", "sub-title": "库存管理大师", "search-placeholder": "搜索产品名称或 SKU...", "btn-backup": "备份至 CSV", "sku-count-label": "在线 SKU 数量", "nav-kitchen": "厨房电器", "nav-laundry": "浴室解决方案", "nav-cooling": "制冷与空调", "nav-small": "小型设备", "form-title": "库存录入", "label-name": "产品名称", "ph-name": "例如：松下智能冰箱", "label-sku": "SKU", "label-cat": "分类", "cat-k": "厨房", "cat-l": "浴室", "cat-c": "制冷", "cat-s": "小型项目", "label-cost": "成本 (RM)", "label-price": "售价 (RM)", "label-stock": "库存数量", "label-spec": "技术规格", "ph-spec": "12.5KG / 2000W", "btn-save": "同步到云端", "sync-init": "正在初始化同步...", "sync-desc": "Firebase 实时连接已启用。", "empty-msg": "未找到匹配的产品数据。", "items-unit": "件", "margin-label": "利润率", "stock-label": "库存", "spec-label": "规格", "cost-label": "成本", "profit-label": "利润", "price-label": "销售价格", "delete-confirm": "确定要从云端数据库中永久移除此产品吗？", "sync-success": "云端已同步", "sync-fail": "连接失败", "label-brand": "品牌", "label-dim": "尺寸", "label-colour": "颜色", "label-power": "功率"
            }
        };

        let currentLang = 'en';
        let products = [];
        let searchQuery = "";
        let isDarkMode = false; // Set default to false (Light Mode)

        const form = document.getElementById('product-form');
        const contentArea = document.getElementById('content-area');
        const countDisplay = document.getElementById('product-count');
        const searchInput = document.getElementById('search-input');
        const syncStatus = document.getElementById('sync-status');
        const langToggle = document.getElementById('lang-toggle');
        const saveBtn = document.getElementById('save-btn');
        const themeToggle = document.getElementById('theme-toggle');

        // Theme Logic
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode', !isDarkMode);
            document.getElementById('sun-icon').classList.toggle('hidden', isDarkMode);
            document.getElementById('moon-icon').classList.toggle('hidden', !isDarkMode);
        });

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            document.getElementById('lang-text').innerText = currentLang === 'en' ? '中文' : 'English';
            updateUI();
        });

        function updateUI() {
            document.title = translations[currentLang]["main-title"];
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
            });
            document.querySelectorAll('[data-t-placeholder]').forEach(el => {
                const key = el.getAttribute('data-t-placeholder');
                if (translations[currentLang][key]) el.placeholder = translations[currentLang][key];
            });
            renderDashboard();
        }

        onSnapshot(query(inventoryRef, orderBy("createdAt", "desc")), (snapshot) => {
            products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderDashboard();
            syncStatus.innerText = translations[currentLang]["sync-success"];
            syncStatus.className = 'text-xs text-emerald-400 font-black uppercase tracking-widest';
        }, (error) => {
            syncStatus.innerText = translations[currentLang]["sync-fail"];
            syncStatus.className = 'text-xs text-rose-500 font-black uppercase tracking-widest';
        });

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderDashboard();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            saveBtn.disabled = true;
            
            const cost = parseFloat(document.getElementById('cost').value);
            const price = parseFloat(document.getElementById('price').value);
            const margin = price > 0 ? (((price - cost) / price) * 100).toFixed(1) : 0;

            const newProduct = {
                name: document.getElementById('name').value,
                sku: document.getElementById('sku').value,
                category: document.getElementById('category').value,
                brand: document.getElementById('brand').value || 'N/A',
                dimension: document.getElementById('dimension').value || 'N/A',
                colour: document.getElementById('colour').value || 'N/A',
                power: document.getElementById('power').value || 'N/A',
                cost: cost,
                price: price,
                stock: parseInt(document.getElementById('stock').value),
                margin: margin,
                specs: document.getElementById('specs').value || 'N/A',
                createdAt: serverTimestamp()
            };

            try {
                await addDoc(inventoryRef, newProduct);
                form.reset();
            } catch (err) { 
                console.error(err);
            } finally {
                saveBtn.disabled = false;
            }
        });

        function renderDashboard() {
            contentArea.innerHTML = '';
            const t = translations[currentLang];
            const filtered = products.filter(p => p.name.toLowerCase().includes(searchQuery) || p.sku.toLowerCase().includes(searchQuery));
            countDisplay.innerText = filtered.length;

            if (filtered.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }
            document.getElementById('empty-state').classList.add('hidden');

            const grouped = filtered.reduce((acc, obj) => {
                (acc[obj.category] = acc[obj.category] || []).push(obj);
                return acc;
            }, {});

            const catConfig = {
                'Kitchen': { name: t['nav-kitchen'], img: 'https://cwservicesinc.com/wp-content/uploads/Must-Have-Small-Kitchen-Appliances.jpg' },
                'Bathroom': { name: t['nav-laundry'], img: 'https://fancyhouse-design.com/wp-content/uploads/2023/11/A-floating-vanity-counter-is-the-star-of-this-minimalist-bathroom-design..jpg' },
                'Cooling': { name: t['nav-cooling'], img: 'https://static.vecteezy.com/system/resources/thumbnails/050/033/219/small/a-sleek-air-conditioning-unit-is-installed-high-on-the-wall-emitting-a-soft-blue-glow-while-cooling-the-room-in-the-heat-of-summer-photo.jpeg' },
                'Small': { name: t['nav-small'], img: 'https://images.unsplash.com/photo-1550009158-9ebf69173e03?auto=format&fit=crop&w=1200&q=80' }
            };

            ['Kitchen', 'Bathroom', 'Cooling', 'Small'].forEach(cat => {
                if (grouped[cat]) {
                    const section = document.createElement('section');
                    section.innerHTML = `
                        <div class="category-banner" style="background-image: url('${catConfig[cat].img}')">
                            <div class="relative z-10 flex flex-col items-start gap-4">
                                <span class="bg-indigo-600 px-4 py-1.5 rounded-full text-[10px] font-black text-white uppercase tracking-[0.2em] shadow-lg">
                                    ${grouped[cat].length} ${t['items-unit']}
                                </span>
                                <h2 class="text-5xl md:text-7xl font-black text-white tracking-tighter leading-none">${catConfig[cat].name}</h2>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
                    `;
                    
                    const grid = section.querySelector('div.grid');
                    grouped[cat].forEach((item, idx) => {
                        const card = document.createElement('div');
                        card.className = 'product-card glass p-10 rounded-[40px] flex flex-col';
                        if (idx % 3 === 1) card.classList.add('xl:translate-y-12');

                        card.innerHTML = `
                            <div class="flex-grow">
                                <div class="flex justify-between items-start mb-10">
                                    <div class="px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest ${item.margin >= 30 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-orange-500/10 text-orange-400'} border border-white/5 backdrop-blur-md">
                                        ${item.margin}% ${t['margin-label']}
                                    </div>
                                    <div class="px-4 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest ${item.stock <= 2 ? 'bg-rose-500/20 text-rose-400' : 'bg-slate-800/60 text-slate-400'} border border-white/5">
                                        ${t['stock-label']}: ${item.stock}
                                    </div>
                                </div>
                                <h3 class="text-3xl font-black mb-3 text-white line-clamp-2 leading-[1.1] tracking-tight hover:text-indigo-400 transition-colors cursor-pointer">${item.name}</h3>
                                <p class="text-[11px] text-slate-500 font-black tracking-[0.3em] mb-10 uppercase">${item.sku}</p>
                                
                                <div class="p-6 bg-slate-950/40 rounded-3xl border border-white/5 mb-10 group/spec relative overflow-hidden">
                                    <div class="grid grid-cols-2 gap-y-4 gap-x-6 text-[11px]">
                                        <div>
                                            <p class="text-slate-500 uppercase font-black tracking-widest mb-1 text-[8px]">${t['label-brand']}</p>
                                            <p class="font-bold text-slate-300">${item.brand || '-'}</p>
                                        </div>
                                        <div>
                                            <p class="text-slate-500 uppercase font-black tracking-widest mb-1 text-[8px]">${t['label-colour']}</p>
                                            <p class="font-bold text-slate-300">${item.colour || '-'}</p>
                                        </div>
                                        <div>
                                            <p class="text-slate-500 uppercase font-black tracking-widest mb-1 text-[8px]">${t['label-dim']}</p>
                                            <p class="font-bold text-slate-300">${item.dimension || '-'}</p>
                                        </div>
                                        <div>
                                            <p class="text-slate-500 uppercase font-black tracking-widest mb-1 text-[8px]">${t['label-power']}</p>
                                            <p class="font-bold text-slate-300">${item.power || '-'}</p>
                                        </div>
                                        <div class="col-span-2 pt-2 border-t border-white/5">
                                            <p class="text-slate-500 uppercase font-black tracking-widest mb-1 text-[8px]">${t['spec-label']}</p>
                                            <p class="font-bold text-slate-300">${item.specs}</p>
                                        </div>
                                    </div>
                                    <div class="absolute -right-4 -bottom-4 w-16 h-16 bg-indigo-500/10 blur-2xl group-hover/spec:bg-indigo-500/20 transition-all"></div>
                                </div>
                            </div>
                            
                            <div class="border-t border-white/10 pt-10">
                                <div class="flex justify-between items-end">
                                    <div class="space-y-8">
                                        <div class="flex gap-10">
                                            <div>
                                                <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-2">${t['cost-label']}</p>
                                                <p class="text-base font-bold text-slate-400 tracking-tight">RM ${Number(item.cost).toLocaleString()}</p>
                                            </div>
                                            <div>
                                                <p class="text-[9px] text-indigo-400 uppercase font-black tracking-widest mb-2">${t['profit-label']}</p>
                                                <p class="text-base font-bold text-indigo-400 tracking-tight">+RM ${Number(item.price - item.cost).toLocaleString()}</p>
                                            </div>
                                        </div>
                                        <div>
                                            <p class="text-[10px] text-slate-500 uppercase font-black tracking-[0.25em] mb-2">${t['price-label']}</p>
                                            <p class="text-5xl font-black text-white tracking-tighter tabular-nums">RM ${Number(item.price).toLocaleString()}</p>
                                        </div>
                                    </div>
                                    <button class="delete-btn text-slate-600 hover:text-rose-500 hover:bg-rose-500/10 p-5 rounded-3xl transition-all active:scale-90 border border-transparent hover:border-rose-500/20">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        `;
                        
                        card.addEventListener('mousemove', (e) => {
                            const rect = card.getBoundingClientRect();
                            const x = e.clientX - rect.left;
                            const y = e.clientY - rect.top;
                            const centerX = rect.width / 2;
                            const centerY = rect.height / 2;
                            const rotateX = (y - centerY) / 30;
                            const rotateY = (centerX - x) / 30;
                            card.style.transform = `perspective(2000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-8px)`;
                        });
                        card.addEventListener('mouseleave', () => {
                            card.style.transform = `perspective(2000px) rotateX(0deg) rotateY(0deg) translateY(0)`;
                        });

                        card.querySelector('.delete-btn').onclick = async () => {
                            if(confirm(t["delete-confirm"])) await deleteDoc(doc(db, "pim_inventory", item.id));
                        };
                        grid.appendChild(card);
                    });
                    contentArea.appendChild(section);
                }
            });
        }

        window.exportToCSV = function() {
            const t = translations[currentLang];
            const headers = [t["label-name"], t["label-sku"], t["label-cat"], t["label-brand"], t["label-dim"], t["label-colour"], t["label-power"], t["label-cost"], t["label-price"], t["label-stock"], t["margin-label"], t["label-spec"]];
            const rows = products.map(p => [p.name, p.sku, p.category, p.brand, p.dimension, p.colour, p.power, p.cost, p.price, p.stock, p.margin, p.specs]);
            let csvContent = "data:text/csv;charset=utf-8,\ufeff" + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
            const link = document.createElement("a");
            link.href = encodeURI(csvContent);
            link.download = `PIM_Cloud_Backup_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }

        updateUI();
    </script>
</body>
</html>
